name: Build & Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java 17
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download Eclipse SDK
        if: steps.check.outputs.exists == 'false'
        run: |
          curl -L -o eclipse-sdk.tar.gz \
            'https://www.eclipse.org/downloads/download.php?file=/technology/epp/downloads/release/2025-12/R/eclipse-java-2025-12-R-linux-gtk-x86_64.tar.gz&r=1'
          tar xzf eclipse-sdk.tar.gz

      - name: Build plugin
        if: steps.check.outputs.exists == 'false'
        run: |
          chmod +x plugin/build.sh
          plugin/build.sh eclipse/plugins

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            "plugin/eclipse.mcp.server_${{ steps.version.outputs.version }}.jar" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
